name: Build and Push Microservices

on:
    push:
        branches:
            - master
    workflow_dispatch:
        inputs:
            module:
                description: "Module to build (or 'all' for everything)"
                required: true
                default: "all"
                type: choice
                options:
                    - all
                    - Sphere
                    - Passport
                    - Padlock
                    - Ring
                    - Develop
                    - Messager
                    - Wallet

jobs:
    determine-changes:
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.changes.outputs.matrix }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  submodules: recursive
            - name: Get changed files
              id: changed-files
              run: |
                  # Check submodule changes
                  submodule_changes=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- DysonNetwork.Shared 2>/dev/null | tr '\n' ' ' || echo "")
                  # Check regular file changes
                  file_changes=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | tr '\n' ' ')
                  echo "files=${file_changes} ${submodule_changes}" >> $GITHUB_OUTPUT

            - name: Determine changed services
              id: changes
              run: |
                  services=("Sphere" "Passport" "Padlock" "Ring" "Develop" "Messager" "Wallet")
                  images=("sphere" "passport" "padlock" "ring" "develop" "messager" "wallet")

                  # On manual dispatch, build selected module(s)
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                    selected="${{ github.event.inputs.module }}"
                    json_objects=""
                    if [[ "$selected" == "all" ]]; then
                      for i in "${!services[@]}"; do
                        json_objects+="{\"service\":\"${services[$i]}\",\"image\":\"${images[$i]}\"},"
                      done
                      echo "Building all services on manual dispatch"
                    else
                      for i in "${!services[@]}"; do
                        if [[ "${services[$i]}" == "$selected" ]]; then
                          json_objects+="{\"service\":\"${services[$i]}\",\"image\":\"${images[$i]}\"},"
                          break
                        fi
                      done
                      echo "Building $selected on manual dispatch"
                    fi
                    matrix="{\"include\":[${json_objects%,}]}"
                    echo "matrix=$matrix" >> $GITHUB_OUTPUT
                    exit 0
                  fi

                  files="${{ steps.changed-files.outputs.files }}"
                  matrix="{\"include\":[]}"
                  changed_services=()

                  for file in $files; do
                    if [[ "$file" == DysonNetwork.Shared/* ]]; then
                      changed_services=("${services[@]}")
                      break
                    fi
                    for i in "${!services[@]}"; do
                      if [[ "$file" == DysonNetwork.${services[$i]}/* ]]; then
                        # check if service is already in changed_services
                        if [[ ! " ${changed_services[@]} " =~ " ${services[$i]} " ]]; then
                          changed_services+=("${services[$i]}")
                        fi
                      fi
                    done
                  done

                  if [ ${#changed_services[@]} -gt 0 ]; then
                    json_objects=""
                    for service in "${changed_services[@]}"; do
                      for i in "${!services[@]}"; do
                        if [[ "${services[$i]}" == "$service" ]]; then
                          image="${images[$i]}"
                          break
                        fi
                      done
                      json_objects+="{\"service\":\"$service\",\"image\":\"$image\"},"
                    done
                    matrix="{\"include\":[${json_objects%,}]}"
                  fi
                  echo "matrix=$matrix" >> $GITHUB_OUTPUT

    build-and-push:
        needs: determine-changes
        if: ${{ needs.determine-changes.outputs.matrix != '{"include":[]}' }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        strategy:
            matrix: ${{ fromJson(needs.determine-changes.outputs.matrix) }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  submodules: recursive

            - name: Setup NBGV
              uses: dotnet/nbgv@master
              id: nbgv

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push Docker image for ${{ matrix.service }}
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: DysonNetwork.${{ matrix.service }}/Dockerfile
                  push: true
                  tags: |
                      ghcr.io/${{ vars.PACKAGE_OWNER }}/dyson-${{ matrix.image }}:${{ steps.nbgv.outputs.SimpleVersion }}
                      ghcr.io/${{ vars.PACKAGE_OWNER }}/dyson-${{ matrix.image }}:latest
                  platforms: linux/amd64
